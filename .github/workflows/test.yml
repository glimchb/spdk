name: Test

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
      - name: Display structure of downloaded files
        run: ls -R
      - name: Start SPDK NVMe/TCP target
        # working-directory: /usr/libexec/spdk/scripts
        working-directory: spdk/scripts
        run: |
          sync
          echo 1 > /proc/sys/vm/drop_caches
          echo 1024 > /proc/sys/vm/nr_hugepages
          grep "" /sys/kernel/mm/hugepages/hugepages-*/nr_hugepages
          echo /usr/local/bin/spdk_tgt -m 0x1 -s 512 --no-pci 2>&1
          ./bin/spdk_tgt -m 0x1 -s 512 --no-pci 2>&1 &
          echo wait 5s... && sleep 5s
          for i in {1..10}; do ./rpc.py spdk_get_version && break || sleep 1; done
          ./rpc.py bdev_malloc_create -b Malloc0 64 512
          ./rpc.py bdev_malloc_create -b Malloc1 64 512
          ./rpc.py nvmf_create_transport -t TCP -u 8192 -m 4 -c 0
          ./rpc.py nvmf_create_subsystem nqn.2016-06.io.spdk:cnode1 -a -s SPDK00000000000001 -d SPDK_Controller1
          ./rpc.py nvmf_subsystem_add_listener nqn.2016-06.io.spdk:cnode1 -t tcp -a 127.0.0.1 -s 4420
          ./rpc.py nvmf_subsystem_add_ns nqn.2016-06.io.spdk:cnode1 Malloc0 -n 1
          ./rpc.py nvmf_subsystem_add_ns nqn.2016-06.io.spdk:cnode1 Malloc1 -n 2
          ./rpc_http_proxy.py 0.0.0.0 9009 spdkuser spdkpass'
      - name: Build
        # working-directory: go/rpc
        run: |
          spdk_nvme_identify -r "traddr:`hostname -i` trtype:TCP adrfam:IPv4 trsvcid:5555 hostnqn:nqn.2014-08.org.nvmexpress:uuid:feb98abe-d51f-40c8-b348-2753f3571d3c"
          spdk_nvme_perf     -r "traddr:`hostname -i` trtype:TCP adrfam:IPv4 trsvcid:5555 hostnqn:nqn.2014-08.org.nvmexpress:uuid:feb98abe-d51f-40c8-b348-2753f3571d3c subnqn:nqn.2016-06.io.spdk:cnode1" -c 0x1 -q 1 -o 4096 -w randread -t 10 | tee lognotls.txt

  unittest:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
      - name: Run Unit Tests
        run: |
          ls -R
          ./test/unit/unittest.sh
