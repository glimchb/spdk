name: Build

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      pkgdep_args:
        required: false
        default: ''
        type: string
      configure_args:
        required: false
        default: ''
        type: string


  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install additional packages
        run: sudo ./scripts/pkgdep.sh ${{ inputs.pkgdep_args }}
      - name: Configure
        run: |
          ./configure ${{ inputs.configure_args }} \
              --without-uring \
              --without-fio \
              --without-rbd \
              --without-rdma \
              --without-shared \
              --with-iscsi-initiator \
              --without-vtune \
              --with-vfio-user
      - name: Make
        run: make -j

      - name: 'Tar files'
        run: tar -cvf spdk.tar --exclude-vcs .
      
      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: compiled-spdk
          path: spdk.tar
    
      # - name: Tests
      #   run: ./test/unit/unittest.sh

      # - name: Compile RPM
      #   run: |
      #     ./rpmbuild/rpm.sh \
      #         --target-arch=${ARCH} \
      #         --without-uring \
      #         --with-crypto \
